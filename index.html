<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colmillos Del Alba | DiosesMC</title>
    <style>
        :root {
            --rojo: #d31027;
            --naranja: #ea384d; /* Ajustado para un degradado más suave pero intenso */
            --gradiente: linear-gradient(to right, #d31027, #ea384d);
            --fondo: #0a0a0a;
            --gris-oscuro: #151515;
            --texto-secundario: #a0a0a0;
        }

        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            background-color: var(--fondo); 
            color: white; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Cabecera Centrada */
        header { 
            width: 100%;
            padding: 80px 20px;
            text-align: center;
            background: radial-gradient(circle at center, #250505 0%, var(--fondo) 100%);
        }
        
        h1 { 
            margin: 0; 
            font-size: 3.5rem; 
            font-weight: 800;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff 30%, #ff4b2b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .subtitle { 
            color: var(--texto-secundario);
            font-size: 1.1rem;
            margin-top: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Navegación de Roles Centrada */
        .roles-nav { 
            display: flex; 
            justify-content: center; 
            gap: 12px; 
            margin: 40px 0;
            flex-wrap: wrap;
        }
        
        .btn-rol { 
            background: var(--gris-oscuro);
            color: white;
            border: 1px solid #333;
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: 0.3s;
        }
        
        .btn-rol:hover {
            border-color: var(--rojo);
            background: rgba(211, 16, 39, 0.1);
        }
        
        .btn-rol.active { 
            background: var(--gradiente);
            border: none;
            box-shadow: 0 4px 15px rgba(211, 16, 39, 0.4);
        }

        /* Grid de Usuarios */
        .grid { 
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            padding: 20px;
            max-width: 1000px;
        }

        .card { 
            background: var(--gris-oscuro);
            width: 180px;
            padding: 30px 10px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid #222;
            transition: 0.3s;
        }
        
        .card:hover {
            transform: translateY(-8px);
            border-color: var(--rojo);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .card img { 
            width: 85px; 
            height: 85px; 
            border-radius: 50%; 
            padding: 3px;
            background: var(--gradiente);
            margin-bottom: 15px;
        }

        .card p { 
            margin: 0; 
            font-size: 1.1rem;
            font-weight: 700;
        }

        /* Sección de Información Final */
        .info-clan {
            width: 100%;
            max-width: 700px;
            margin: 80px auto 40px auto;
            text-align: center;
            padding: 40px 20px;
            border-top: 1px solid #222;
        }

        .info-title {
            font-size: 1.5rem;
            color: white;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .info-text {
            color: var(--texto-secundario);
            line-height: 1.6;
            font-size: 1rem;
        }

        .info-text strong {
            color: #fff;
        }

        footer {
            margin-bottom: 40px;
            font-size: 0.8rem;
            color: #444;
        }

    </style>
</head>
<body>

    <header>
        <h1>Colmillos Del Alba</h1>
        <div class="subtitle">Miembros del Clan</div>
    </header>

    <div class="roles-nav">
        <button class="btn-rol active" onclick="mostrarPorRol('Todos', this)">Todos</button>
        <button class="btn-rol" onclick="mostrarPorRol('PVP', this)">⚔️ PVP</button>
        <button class="btn-rol" onclick="mostrarPorRol('BUILDER', this)">⚒️ Builder</button>
        <button class="btn-rol" onclick="mostrarPorRol('TECNICO', this)">⚙️ Técnico</button>
        <button class="btn-rol" onclick="mostrarPorRol('CASUAL', this)">🏛️ Casual</button>
    </div>

    <div class="grid" id="lista-usuarios">
        <div class="card">
            <img src="https://i.imgur.com/h2W40zo.png" alt="Líder">
            <p>Guepar__</p>
        </div>
        </div>

    <section class="info-clan">
        <div class="info-title">Información del Clan</div>
        <p class="info-text">
            Clan <strong>Colmillos Del Alba</strong> del servidor <strong>DiosesMC</strong> (Vegetta777 y Willyrex).<br>
            Creado por <strong>Guepar__</strong> el <strong>10 de enero de 2026</strong>.
        </p>
    </section>

    <footer>
        © 2026 Colmillos Del Alba
    </footer>

    <script>
        function mostrarPorRol(rol, btn) {
            document.querySelectorAll('.btn-rol').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            // Aquí se conectará el fetch del bot de Railway más adelante
        }
    </script>
</body>
</html>
