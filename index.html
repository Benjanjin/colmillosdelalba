<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colmillos Del Alba | DiosesMC</title>
    <style> 
        :root {
            --rojo: #d31027;
            --naranja: #ea384d;
            --gradiente: linear-gradient(135deg, #d31027 0%, #ea384d 100%);
            --fondo: #0a0a0a;
            --gris-oscuro: #121212;
            --texto-secundario: #a0a0a0;
            --borde: rgba(255, 255, 255, 0.05);
        }

        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            background-color: var(--fondo); 
            color: white; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        header { 
            width: 100%;
            padding: 100px 20px;
            text-align: center;
            background: radial-gradient(circle at center, #300505 0%, var(--fondo) 80%);
        }
        
        h1 { 
            margin: 0; 
            font-size: clamp(2.5rem, 8vw, 4rem); 
            font-weight: 900;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff 40%, #ff4b2b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
            filter: drop-shadow(0 0 15px rgba(211, 16, 39, 0.3));
        }

        .subtitle { 
            color: var(--texto-secundario);
            font-size: 1rem;
            margin-top: 15px;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .roles-nav { 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            margin: -20px 0 50px 0;
            flex-wrap: wrap;
            padding: 0 20px;
            z-index: 10;
        }
        
        .btn-rol { 
            background: var(--gris-oscuro);
            color: #ccc;
            border: 1px solid var(--borde);
            padding: 12px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }
        
        .btn-rol:hover {
            border-color: var(--rojo);
            color: white;
            transform: translateY(-3px);
            background: rgba(211, 16, 39, 0.1);
        }
        
        .btn-rol.active { 
            background: var(--gradiente);
            border: none;
            color: white;
            box-shadow: 0 8px 20px rgba(211, 16, 39, 0.4);
        }

        .grid { 
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 30px;
            padding: 20px;
            width: 90%;
            max-width: 1100px;
            min-height: 300px;
        }

        .card { 
            background: linear-gradient(145deg, #181818, #0f0f0f);
            padding: 35px 15px;
            border-radius: 24px;
            text-align: center;
            border: 1px solid var(--borde);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }
        
        .card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at top right, rgba(211, 16, 39, 0.1), transparent);
            pointer-events: none;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(211, 16, 39, 0.5);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .card img { 
            width: 95px; 
            height: 95px; 
            border-radius: 50%; 
            padding: 4px;
            background: var(--gradiente);
            margin-bottom: 20px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            transition: 0.4s;
        }

        .card:hover img {
            transform: rotate(5deg) scale(1.1);
        }

        .card p { 
            margin: 0; 
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #f0f0f0;
        }

        .info-clan {
            width: 100%;
            max-width: 800px;
            margin: 100px auto 50px auto;
            text-align: center;
            padding: 50px 20px;
            border-top: 1px solid var(--borde);
        }

        .info-title {
            font-size: 1.8rem;
            color: white;
            margin-bottom: 20px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .info-text {
            color: var(--texto-secundario);
            line-height: 1.8;
            font-size: 1.1rem;
        }

        .info-text strong { color: var(--naranja); }

        footer {
            margin-bottom: 50px;
            font-size: 0.9rem;
            color: #333;
            font-weight: 600;
        }

        /* Animación de entrada */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card { animation: fadeIn 0.5s ease forwards; }

    </style>
</head>
<body>

    <header>
        <h1>Colmillos Del Alba</h1>
        <div class="subtitle">Legión DiosesMC</div>
    </header>

    <div class="roles-nav">
        <button class="btn-rol active" onclick="filtrarPorID('Todos', this)">Todos</button>
        <button class="btn-rol" onclick="filtrarPorID('1464335696390263069', this)">⚔️ PVP</button>
        <button class="btn-rol" onclick="filtrarPorID('1464335639561506878', this)">⚒️ Builder</button>
        <button class="btn-rol" onclick="filtrarPorID('1464335746944209161', this)">⚙️ Técnico</button>
        <button class="btn-rol" onclick="filtrarPorID('1464335746856128737', this)">🌱 Farmer</button>
        <button class="btn-rol" onclick="filtrarPorID('1479953030605443204', this)">🔨 Herrero</button>
    </div>

    <div class="grid" id="lista-usuarios">
        <p style="opacity: 0.5; grid-column: 1/-1;">Conectando con el servidor...</p>
    </div>

    <section class="info-clan">
        <div class="info-title">Información del Clan</div>
        <p class="info-text">
            Clan <strong>Colmillos Del Alba</strong> • Servidor <strong>DiosesMC</strong><br>
            Liderado por <strong>Guepar__</strong> • Desde el <strong>10 de enero, 2026</strong>.
        </p>
    </section>

    <footer>
        © 2026 COLMILLOS DEL ALBA • MINAS, URUGUAY
    </footer>

    <script>
        const API_URL = "https://bot-discord-production-e093.up.railway.app/miembros";
        let miembrosCache = [];

        async function obtenerMiembros() {
            const grid = document.getElementById('lista-usuarios');
            try {
                const respuesta = await fetch(`${API_URL}?t=${Date.now()}`);
                if (!respuesta.ok) throw new Error("Error de red");
                
                miembrosCache = await respuesta.json();
                renderizarPantalla(miembrosCache);
            } catch (error) {
                grid.innerHTML = "<p style='color: var(--rojo); grid-column: 1/-1;'>El servidor está despertando... recarga en unos segundos.</p>";
            }
        }

        function renderizarPantalla(lista) {
            const grid = document.getElementById('lista-usuarios');
            grid.innerHTML = ''; 

            if (!lista || lista.length === 0) {
                grid.innerHTML = "<p style='opacity: 0.5; grid-column: 1/-1;'>No hay miembros en esta categoría.</p>";
                return;
            }

            lista.forEach((user, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.animationDelay = (index * 0.05) + "s";
                card.innerHTML = `
                    <img src="${user.avatar || 'https://cdn.discordapp.com/embed/avatars/0.png'}" alt="${user.username}">
                    <p>${user.username}</p>
                `;
                grid.appendChild(card);
            });
        }

        function filtrarPorID(idBuscada, btn) {
            // Estética de botones
            document.querySelectorAll('.btn-rol').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            if (idBuscada === 'Todos') {
                renderizarPantalla(miembrosCache);
            } else {
                // Filtramos comparando las IDs exactas que envía el bot
                const filtrados = miembrosCache.filter(m => 
                    m.roles && m.roles.includes(idBuscada)
                );
                renderizarPantalla(filtrados);
            }
        }

        obtenerMiembros();
    </script>
</body>
</html>
