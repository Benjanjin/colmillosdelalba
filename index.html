<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colmillos Del Alba | Dashboard Supremo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style> 
        :root {
            --rojo-neon: #ff0022;
            --rojo-oscuro: #8b0000;
            --gradiente-vivos: linear-gradient(135deg, #ff0022 0%, #8b0000 100%);
            --fondo-negro: #050505;
            --tarjeta: #0d0d0d;
            --sidebar-width: 260px;
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--fondo-negro); 
            color: #e0e0e0; 
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: var(--sidebar-width);
            background: #080808;
            border-right: 1px solid rgba(255, 0, 34, 0.1);
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .sidebar h2 {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 50px;
            letter-spacing: 3px;
            background: var(--gradiente-vivos);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .menu-label { 
            font-size: 0.65rem; 
            color: #444; 
            text-transform: uppercase; 
            margin: 20px 0 10px 10px; 
            font-weight: 900;
        }

        .nav-btn {
            width: 100%;
            background: transparent;
            border: none;
            color: #888;
            padding: 14px 18px;
            text-align: left;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 8px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-btn:hover, .nav-btn.active {
            background: rgba(255, 0, 34, 0.05);
            color: var(--rojo-neon);
            box-shadow: inset 4px 0 0 var(--rojo-neon);
        }

        /* --- MAIN --- */
        .main-content {
            margin-left: var(--sidebar-width);
            flex-grow: 1;
            padding: 60px;
            background: radial-gradient(circle at 10% 10%, #1a0505 0%, var(--fondo-negro) 50%);
        }

        .section { display: none; animation: slideUp 0.6s ease forwards; }
        .section.active { display: block; }

        h1 { 
            font-family: 'Syncopate', sans-serif; 
            font-size: 1.6rem; 
            margin-bottom: 40px; 
            border-left: 5px solid var(--rojo-neon);
            padding-left: 20px;
        }

        /* --- ARBOL DE LIDERES --- */
        .leader-tree {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            padding-top: 20px;
        }

        /* Línea vertical central */
        .leader-tree::after {
            content: '';
            position: absolute;
            top: 0;
            width: 2px;
            height: 85%;
            background: linear-gradient(to bottom, var(--rojo-neon), transparent);
            z-index: 1;
        }

        .leader-box {
            background: #111;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            min-width: 190px;
            margin-bottom: 50px;
            position: relative;
            z-index: 5;
            transition: 0.3s;
        }

        .leader-box:hover {
            transform: translateY(-5px);
            border-color: var(--rojo-neon);
            box-shadow: 0 0 25px rgba(255, 0, 34, 0.2);
        }

        .leader-box img { 
            width: 80px; height: 80px; border-radius: 50%; 
            margin-bottom: 12px; border: 3px solid var(--rojo-neon);
            background: #000; object-fit: cover;
        }

        .rank { 
            font-size: 0.65rem; color: var(--rojo-neon); 
            text-transform: uppercase; font-weight: 900; 
            letter-spacing: 1.5px; margin-bottom: 5px; display: block;
        }

        .leader-name { font-weight: 800; font-size: 1rem; color: #fff; }

        .leader-row { 
            display: flex; gap: 60px; justify-content: center; width: 100%; position: relative; z-index: 5;
        }

        /* --- ROLES Y GRID --- */
        .roles-nav { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 40px; }
        .btn-rol { 
            background: #111; color: #666; border: 1px solid rgba(255,255,255,0.05);
            padding: 12px 20px; border-radius: 12px; cursor: pointer; font-weight: 700;
        }
        .btn-rol.active { background: var(--gradiente-vivos); color: white; border: none; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 20px; }
        .card { 
            background: #0d0d0d; padding: 25px 15px; border-radius: 20px; text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .card img { width: 80px; height: 80px; border-radius: 50%; margin-bottom: 15px; background: var(--gradiente-vivos); padding: 2px; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>COLMILLOS</h2>
        <span class="menu-label">Principal</span>
        <button class="nav-btn active" onclick="showSection('info', this)"><i class="fas fa-database"></i> Información</button>
        <button class="nav-btn" onclick="showSection('lideres', this)"><i class="fas fa-sitemap"></i> Jerarquía</button>
        <span class="menu-label">Comunidad</span>
        <button class="nav-btn" onclick="showSection('roles', this)"><i class="fas fa-user-group"></i> Miembros</button>
    </div>

    <div class="main-content">
        <div id="info" class="section active">
            <h1>INFORMACION</h1>
            <div style="background: var(--tarjeta); padding: 40px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.03);">
                <p><i class="fas fa-shield-halved" style="color:var(--rojo-neon)"></i> <strong> Clan:</strong> Colmillos Del Alba</p>
                <p><i class="fas fa-crosshairs" style="color:var(--rojo-neon)"></i> <strong> Objetivo:</strong> Dominación DiosesMC</p>
                <p><i class="fas fa-clock" style="color:var(--rojo-neon)"></i> <strong> Desde:</strong> Enero 2026</p>
            </div>
        </div>

        <div id="lideres" class="section">
            <h1>JERARQUIA DE LIDERES</h1>
            <div class="leader-tree" id="tree-container">
                <p>Sincronizando con Discord...</p>
            </div>
        </div>

        <div id="roles" class="section">
            <h1>REGISTRO DE MIEMBROS</h1>
            <div class="roles-nav">
                <button class="btn-rol active" onclick="filtroTotal('Todos', this)">Todos</button>
                <button class="btn-rol" onclick="filtroTotal('𝒑𝒗𝒑', this)">⚔️ PVP</button>
                <button class="btn-rol" onclick="filtroTotal('𝒃𝒖𝒊𝒍𝒅𝒆𝒓𝒔', this)">⚒️ Builder</button>
                <button class="btn-rol" onclick="filtroTotal('𝒕𝒆𝒄𝒏𝒊𝒄𝒐𝒔', this)">⚙️ Técnico</button>
                <button class="btn-rol" onclick="filtroTotal('Farmer', this)">🌱 Farmer</button>
                <button class="btn-rol" onclick="filtroTotal('Herrero', this)">🔨 Herrero</button>
            </div>
            <div class="grid" id="lista-usuarios">
                <p>Cargando base de datos...</p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://bot-discord-production-e093.up.railway.app/miembros";
        let miembrosCache = [];

        // Escribe aquí los nombres exactos o partes del nombre
        const JERARQUIA = [
            { nick: "guepar_3111", rango: "Líder Supremo", icono: "fa-star" },
            { nick: "nicol3_espin0za", rango: "Co-Líder", icono: "fa-crown" },
            { fila: [
                { nick: "danielitaxgg18", rango: "Líder Técnico" },
                { nick: "1fsi.", rango: "Líder Farmer" }
            ]},
            { fila: [
                { nick: "postm_alone", rango: "Líder PVP" },
                { nick: "__jpmc", rango: "Líder Construcción" }
            ]}
        ];

        function showSection(sectionId, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            btn.classList.add('active');
        }

        async function obtenerMiembros() {
            try {
                const respuesta = await fetch(`${API_URL}?t=${Date.now()}`);
                miembrosCache = await respuesta.json();
                renderizarPantalla(miembrosCache);
                renderizarJerarquia();
            } catch (error) {
                console.error("Error API:", error);
            }
        }

        function renderizarJerarquia() {
            const container = document.getElementById('tree-container');
            container.innerHTML = '';

            JERARQUIA.forEach(item => {
                if(item.fila) {
                    let rowHtml = '<div class="leader-row">';
                    item.fila.forEach(l => rowHtml += crearCardLider(l));
                    rowHtml += '</div>';
                    container.innerHTML += rowHtml;
                } else {
                    container.innerHTML += crearCardLider(item);
                }
            });
        }

        function crearCardLider(info) {
            // BUSCADOR INTELIGENTE: Ignora puntos, mayúsculas y espacios
            const user = miembrosCache.find(m => {
                const buscar = info.nick.toLowerCase().trim();
                const u = (m.username || "").toLowerCase();
                const n = (m.nickname || "").toLowerCase();
                const g = (m.globalName || "").toLowerCase();
                return u.includes(buscar) || n.includes(buscar) || g.includes(buscar) || buscar.includes(u);
            });

            const foto = user ? user.avatar : 'https://cdn.discordapp.com/embed/avatars/0.png';
            const nombreFinal = user ? (user.nickname || user.username) : info.nick;

            return `
                <div class="leader-box">
                    <span class="rank">${info.icono ? `<i class="fas ${info.icono}"></i> ` : ''}${info.rango}</span>
                    <img src="${foto}" alt="Lider" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'">
                    <div class="leader-name">${nombreFinal}</div>
                </div>
            `;
        }

        function renderizarPantalla(lista) {
            const grid = document.getElementById('lista-usuarios');
            grid.innerHTML = ''; 
            lista.forEach(user => {
                grid.innerHTML += `
                    <div class="card">
                        <img src="${user.avatar || 'https://cdn.discordapp.com/embed/avatars/0.png'}" alt="Avatar">
                        <p style="font-weight:800; margin:0; font-size:0.9rem;">${user.nickname || user.username}</p>
                    </div>
                `;
            });
        }

        function filtroTotal(key, btn) {
            document.querySelectorAll('.btn-rol').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (key === 'Todos') { renderizarPantalla(miembrosCache); return; }
            const filtrados = miembrosCache.filter(m => m.roles && m.roles.some(rol => 
                rol.includes(key) || rol.toLowerCase().includes(key.toLowerCase())
            ));
            renderizarPantalla(filtrados);
        }

        obtenerMiembros();
    </script>
</body>
</html>
