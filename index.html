<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colmillos Del Alba | Dashboard Supremo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style> 
        :root {
            --rojo-neon: #ff0022;
            --naranja-fuego: #ff8c00;
            --fondo-negro: #030303;
            --tarjeta: rgba(10, 10, 10, 0.95);
            --sidebar-width: 260px;
        }

        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--fondo-negro); color: #e0e0e0; margin: 0; display: flex; min-height: 100vh; overflow-x: hidden; }

        /* --- FONDO DE ESPADAS REALES ANIMADAS --- */
        #bg-combat { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at center, #1a0202 0%, #000 100%); overflow: hidden; }
        .sword {
            position: absolute; width: 60px; height: 60px; background-size: contain; background-repeat: no-repeat;
            opacity: 0.2; filter: drop-shadow(0 0 10px var(--rojo-neon)); animation: floatSwords 20s infinite linear;
        }
        .s-neth { background-image: url('https://minecraft.wiki/images/Netherite_Sword_JE2_BE2.png'); }
        .s-diam { background-image: url('https://minecraft.wiki/images/Diamond_Sword_JE3_BE3.png'); }
        .s-gold { background-image: url('https://minecraft.wiki/images/Golden_Sword_JE3_BE2.png'); }

        @keyframes floatSwords {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* --- SIDEBAR --- */
        .sidebar { width: var(--sidebar-width); background: rgba(0, 0, 0, 0.98); border-right: 2px solid var(--rojo-neon); padding: 40px 20px; position: fixed; height: 100vh; z-index: 100; box-shadow: 5px 0 20px rgba(255,0,0,0.2); }
        .sidebar h2 { font-family: 'Syncopate', sans-serif; font-size: 0.8rem; text-align: center; margin-bottom: 50px; color: var(--rojo-neon); text-shadow: 0 0 10px var(--rojo-neon); }
        .menu-label { font-size: 0.6rem; color: #555; text-transform: uppercase; margin: 20px 0 10px 10px; font-weight: 900; }
        .nav-btn { width: 100%; background: transparent; border: none; color: #888; padding: 14px 18px; text-align: left; border-radius: 12px; cursor: pointer; transition: 0.3s; margin-bottom: 8px; font-weight: 700; display: flex; align-items: center; gap: 12px; }
        .nav-btn:hover, .nav-btn.active { background: rgba(255, 0, 34, 0.1); color: #fff; box-shadow: inset 4px 0 0 var(--rojo-neon); }

        /* --- MAIN --- */
        .main-content { margin-left: var(--sidebar-width); flex-grow: 1; padding: 60px; z-index: 1; }
        .section { display: none; animation: fadeIn 0.5s ease forwards; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* --- MEGA FILTRO DE MIEMBROS --- */
        .filter-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 30px; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,0,0,0.1); }
        .filter-btn { background: #111; border: 1px solid #333; color: #aaa; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 0.75rem; transition: 0.3s; }
        .filter-btn:hover, .filter-btn.active { background: var(--rojo-neon); color: #fff; border-color: var(--rojo-neon); box-shadow: 0 0 15px rgba(255,0,0,0.3); }

        /* --- GRANJAS (NARANJA DEGRADADO) --- */
        .farm-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .farm-card { background: var(--tarjeta); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: 0.4s; }
        .farm-card:hover { transform: translateY(-10px); border-color: var(--naranja-fuego); }
        .farm-badge { display: inline-block; padding: 6px 14px; background: linear-gradient(90deg, #ff8c00, #ff4500); color: #fff; font-size: 0.65rem; font-weight: 900; border-radius: 5px; margin-top: 10px; text-transform: uppercase; box-shadow: 0 4px 10px rgba(255, 140, 0, 0.3); }

        /* --- JERARQUÍA --- */
        .leader-tree { display: flex; flex-direction: column; align-items: center; position: relative; }
        .leader-box { background: #0a0a0a; padding: 20px; border-radius: 20px; border: 1px solid var(--rojo-neon); text-align: center; margin-bottom: 40px; min-width: 180px; }
        .leader-box img { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--rojo-neon); margin-bottom: 10px; }
        .leader-row { display: flex; gap: 40px; justify-content: center; flex-wrap: wrap; }

        /* --- MIEMBROS --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .card { background: var(--tarjeta); padding: 20px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .card img { width: 70px; height: 70px; border-radius: 50%; margin-bottom: 12px; border: 1px solid var(--rojo-neon); }
    </style>
</head>
<body>

    <div id="bg-combat"></div>

    <div class="sidebar">
        <h2>COLMILLOS DEL ALBA</h2>
        <span class="menu-label">Navegación</span>
        <button class="nav-btn active" onclick="switchTab('info', this)"><i class="fas fa-home"></i> Inicio</button>
        <button class="nav-btn" onclick="switchTab('lideres', this)"><i class="fas fa-crown"></i> Jerarquía</button>
        <button class="nav-btn" onclick="switchTab('granjas', this)"><i class="fas fa-wheat-awn"></i> Granjas</button>
        <button class="nav-btn" onclick="switchTab('roles', this)"><i class="fas fa-users"></i> Miembros</button>
    </div>

    <div class="main-content">
        <div id="info" class="section active">
            <h1>CENTRAL DE MANDO</h1>
            <div style="background: var(--tarjeta); padding: 40px; border-radius: 20px; border: 1px solid rgba(255,0,0,0.1)">
                <p><i class="fas fa-shield-virus" style="color:var(--rojo-neon)"></i> <strong>Clan:</strong> Colmillos Del Alba</p>
                <p><i class="fas fa-globe" style="color:var(--rojo-neon)"></i> <strong>Servidor:</strong> DiosesMC</p>
            </div>
        </div>

        <div id="granjas" class="section">
            <h1>PLANOS DE GRANJAS</h1>
            <div class="farm-grid">
                <div class="farm-card">
                    <img src="https://imgur.com/ZawCT1U.png" style="width:100%; height:180px; object-fit:cover;">
                    <div style="padding:20px;">
                        <h3>Granja de Hierro</h3>
                        <span class="farm-badge">Producción Industrial</span>
                    </div>
                </div>
                <div class="farm-card">
                    <img src="https://imgur.com/sOvjMva.png" style="width:100%; height:180px; object-fit:cover;">
                    <div style="padding:20px;">
                        <h3>Granja de Oro</h3>
                        <span class="farm-badge">XP & Oro Infinito</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="lideres" class="section">
            <h1>JERARQUÍA SUPREMA</h1>
            <div class="leader-tree" id="tree-container"></div>
        </div>

        <div id="roles" class="section">
            <h1>MIEMBROS DEL CLAN</h1>
            <div class="filter-bar">
                <button class="filter-btn active" onclick="filtrar('todos', this)">TODOS</button>
                <button class="filter-btn" onclick="filtrar('Builder', this)">BUILDERS</button>
                <button class="filter-btn" onclick="filtrar('Farmer', this)">FARMERS</button>
                <button class="filter-btn" onclick="filtrar('Herrero', this)">HERREROS</button>
                <button class="filter-btn" onclick="filtrar('Tecnico', this)">TÉCNICOS</button>
                <button class="filter-btn" onclick="filtrar('PVP', this)">PVP</button>
            </div>
            <div class="grid" id="lista-usuarios"></div>
        </div>
    </div>

    <script>
        // ESPADAS ANIMADAS
        function createSwords() {
            const container = document.getElementById('bg-combat');
            const classes = ['s-neth', 's-diam', 's-gold'];
            for(let i=0; i<15; i++) {
                const s = document.createElement('div');
                s.className = `sword ${classes[Math.floor(Math.random()*3)]}`;
                s.style.left = Math.random()*100 + 'vw';
                s.style.animationDelay = Math.random()*15 + 's';
                s.style.animationDuration = (Math.random()*10 + 15) + 's';
                container.appendChild(s);
            }
        }
        createSwords();

        // NAVEGACIÓN
        function switchTab(id, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        const API_URL = "https://bot-discord-production-e093.up.railway.app/miembros";
        let miembrosCache = [];

        // ESTRUCTURA JERARQUÍA
        const JERARQUIA = [
            { nick: "guepar_3111", rango: "Líder Supremo" },
            { nick: "nicol3_espin0za", rango: "Co-Líder" },
            { fila: [{ nick: "danielitaxgg18", rango: "Líder Técnico" }, { nick: "1fsi.", rango: "Líder Farmer" }] }
        ];

        async function cargar() {
            try {
                const res = await fetch(`${API_URL}?t=${Date.now()}`);
                miembrosCache = await res.json();
                renderJerarquia();
                filtrar('todos');
            } catch(e) { console.error(e); }
        }

        function renderJerarquia() {
            const container = document.getElementById('tree-container');
            container.innerHTML = JERARQUIA.map(item => {
                if(item.fila) {
                    return `<div class="leader-row">${item.fila.map(l => cardLider(l)).join('')}</div>`;
                }
                return cardLider(item);
            }).join('');
        }

        function cardLider(l) {
            const u = miembrosCache.find(m => (m.username||"").toLowerCase().includes(l.nick.toLowerCase()));
            const img = u ? u.avatar : 'https://cdn.discordapp.com/embed/avatars/0.png';
            return `<div class="leader-box"><span style="color:var(--rojo-neon); font-size:0.7rem; font-weight:900;">${l.rango}</span><br><img src="${img}"><div style="font-weight:bold;">${u ? (u.nickname || u.username) : l.nick}</div></div>`;
        }

        function filtrar(rol, btn) {
            if(btn) {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            const grid = document.getElementById('lista-usuarios');
            const filtrados = rol === 'todos' ? miembrosCache : miembrosCache.filter(u => u.roles && u.roles.includes(rol));
            
            grid.innerHTML = filtrados.map(u => `
                <div class="card">
                    <img src="${u.avatar || 'https://cdn.discordapp.com/embed/avatars/0.png'}">
                    <div style="font-weight:bold; font-size:0.85rem;">${u.nickname || u.username}</div>
                </div>
            `).join('');
        }

        cargar();
    </script>
</body>
</html>
