<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colmillos Del Alba | DiosesMC</title>
    <style> 
        :root {
            --rojo: #d31027;
            --naranja: #ea384d;
            --gradiente: linear-gradient(135deg, #d31027 0%, #ea384d 100%);
            --fondo: #0a0a0a;
            --gris-oscuro: #121212;
            --texto-secundario: #a0a0a0;
            --borde: rgba(255, 255, 255, 0.05);
        }

        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            background-color: var(--fondo); 
            color: white; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        header { 
            width: 100%;
            padding: 100px 20px;
            text-align: center;
            background: radial-gradient(circle at center, #300505 0%, var(--fondo) 80%);
        }
        
        h1 { 
            margin: 0; 
            font-size: clamp(2.5rem, 8vw, 4rem); 
            font-weight: 900;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff 40%, #ff4b2b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
            filter: drop-shadow(0 0 15px rgba(211, 16, 39, 0.3));
        }

        .subtitle { 
            color: var(--texto-secundario);
            font-size: 1rem;
            margin-top: 15px;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .roles-nav { 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            margin: -20px 0 50px 0;
            flex-wrap: wrap;
            padding: 0 20px;
            z-index: 10;
        }
        
        .btn-rol { 
            background: var(--gris-oscuro);
            color: #ccc;
            border: 1px solid var(--borde);
            padding: 12px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }
        
        .btn-rol:hover {
            border-color: var(--rojo);
            color: white;
            transform: translateY(-3px);
            background: rgba(211, 16, 39, 0.1);
        }
        
        .btn-rol.active { 
            background: var(--gradiente);
            border: none;
            color: white;
            box-shadow: 0 8px 20px rgba(211, 16, 39, 0.4);
        }

        .grid { 
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 30px;
            padding: 20px;
            width: 90%;
            max-width: 1100px;
            min-height: 300px;
        }

        .card { 
            background: linear-gradient(145deg, #181818, #0f0f0f);
            padding: 35px 15px;
            border-radius: 24px;
            text-align: center;
            border: 1px solid var(--borde);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.5s ease forwards;
        }
        
        .card img { 
            width: 95px; 
            height: 95px; 
            border-radius: 50%; 
            padding: 4px;
            background: var(--gradiente);
            margin-bottom: 20px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
        }

        .card p { 
            margin: 0; 
            font-size: 1.2rem;
            font-weight: 800;
            color: #f0f0f0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer { margin: 50px 0; color: #333; font-weight: 600; }
    </style>
</head>
<body>

    <header>
        <h1>Colmillos Del Alba</h1>
        <div class="subtitle">Legión DiosesMC</div>
    </header>

    <div class="roles-nav">
        <button class="btn-rol active" onclick="superFiltro('Todos', 'Todos', this)">Todos</button>
        <button class="btn-rol" onclick="superFiltro('1464335696390263069', 'PVP', this)">⚔️ PVP</button>
        <button class="btn-rol" onclick="superFiltro('1464335639561506878', 'BUILDER', this)">⚒️ Builder</button>
        <button class="btn-rol" onclick="superFiltro('1464335746944209161', 'TECNICO', this)">⚙️ Técnico</button>
        <button class="btn-rol" onclick="superFiltro('1464335746856128737', 'FARMER', this)">🌱 Farmer</button>
        <button class="btn-rol" onclick="superFiltro('1479953030605443204', 'HERREROS', this)">🔨 Herrero</button>
    </div>

    <div class="grid" id="lista-usuarios">
        <p style="opacity: 0.5; grid-column: 1/-1;">Conectando...</p>
    </div>

    <footer>
        © 2026 COLMILLOS DEL ALBA • URUGUAY
    </footer>

    <script>
        const API_URL = "https://bot-discord-production-e093.up.railway.app/miembros";
        let miembrosCache = [];

        async function obtenerMiembros() {
            const grid = document.getElementById('lista-usuarios');
            try {
                const respuesta = await fetch(`${API_URL}?t=${Date.now()}`);
                miembrosCache = await respuesta.json();
                console.log("Datos recibidos:", miembrosCache);
                renderizarPantalla(miembrosCache);
            } catch (error) {
                grid.innerHTML = "<p>Error al conectar con el clan.</p>";
            }
        }

        function renderizarPantalla(lista) {
            const grid = document.getElementById('lista-usuarios');
            grid.innerHTML = ''; 
            if (!lista || lista.length === 0) {
                grid.innerHTML = "<p style='opacity: 0.5; grid-column: 1/-1;'>No hay miembros aquí.</p>";
                return;
            }
            lista.forEach(user => {
                grid.innerHTML += `
                    <div class="card">
                        <img src="${user.avatar || 'https://cdn.discordapp.com/embed/avatars/0.png'}" alt="Avatar">
                        <p>${user.username}</p>
                    </div>
                `;
            });
        }

        // ESTA FUNCIÓN ES LA SOLUCIÓN: Busca por ID o por Nombre al mismo tiempo
        function superFiltro(id, nombre, btn) {
            document.querySelectorAll('.btn-rol').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            if (id === 'Todos') {
                renderizarPantalla(miembrosCache);
                return;
            }

            const filtrados = miembrosCache.filter(m => {
                if (!m.roles) return false;
                // Busca si en la lista de roles está la ID O si está el NOMBRE
                return m.roles.some(rol => 
                    rol === id || 
                    rol.toUpperCase().includes(nombre.toUpperCase())
                );
            });

            renderizarPantalla(filtrados);
        }

        obtenerMiembros();
    </script>
</body>
</html>
